<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>XRP Domain Verification</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f8fb;
        color: #111827;
      }

      main {
        width: min(680px, calc(100% - 32px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 8vw, 4rem);
        line-height: 1;
      }

      p {
        margin: 0 0 16px;
        font-size: 1.1rem;
        line-height: 1.5;
      }

      code {
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>XRP Domain Verification</h1>
      <p>This site hosts the public XRP Ledger verification file for the listed mainnet account.</p>
      <p><code>/.well-known/xrp-ledger.toml</code></p>
    </main>
  </body>
</html>
